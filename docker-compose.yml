
services:
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mesoquick_frontend_dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
    networks:
      - mesoquick_net
    environment:
      - NODE_ENV=development
      - VITE_API_GATEWAY_URL=http://broker-gateway:8000
    tty: true
    init: true 

networks:
  mesoquick_net:
    driver: bridge